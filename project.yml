name: Linko
options:
  bundleIdPrefix: com.gumpw
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  LinkoKit:
    path: packages/LinkoKit

targets:
  LinkoApp:
    type: application
    platform: macOS
    sources:
      - path: apps/LinkoApp
    dependencies:
      - package: LinkoKit
    postBuildScripts:
      - name: Embed vendored sing-box
        shell: /bin/sh
        script: |
          # Bundle the vendored core (if fetched) so the app finds it
          # regardless of the launch working directory.
          SRC="$SRCROOT/vendor/sing-box/sing-box"
          DST="$BUILT_PRODUCTS_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/sing-box"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            chmod +x "$DST"
          fi
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/sing-box
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gumpw.linko
        PRODUCT_NAME: Linko
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
