name: Linko
options:
  bundleIdPrefix: com.gumpw
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    # Single source of truth for the app version, shared by every target so the
    # app and its embedded system extension stay in lockstep. `make bump-version`
    # rewrites these two lines; the build number follows touch-code's
    # YYYYMMDDNNN scheme (8-digit date + 3-digit daily sequence).
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "20260611002"

packages:
  LinkoKit:
    path: packages/LinkoKit
  # Sparkle 2 auto-update framework. App target ONLY — LinkoKit never links it.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  LinkoApp:
    type: application
    platform: macOS
    sources:
      - path: apps/LinkoApp
        excludes:
          # The .icon bundle is added explicitly below as an opaque resource;
          # excluding it here stops XcodeGen from recursing into it as a group.
          - "Linko.icon"
      # App icon authored in Icon Composer (Xcode 26+). The .icon is the
      # editable source of truth — open it in Icon Composer to edit layers.
      - path: apps/LinkoApp/Linko.icon
        type: file
        buildPhase: resources
    dependencies:
      - package: LinkoKit
      # Sparkle auto-update — app target only (LinkoKit keeps Yams only).
      - package: Sparkle
        product: Sparkle
      # Embed the system extension into the app bundle so the app can install
      # and start it. The extension is the only target that links Libbox.
      # codeSign:true adds CodeSignOnCopy so the extension is re-signed during
      # the app's signing and sealed as NESTED CODE (with a cdhash) — without
      # it the extension is sealed as flat resource files and the
      # SystemExtensions framework can't enumerate it ("Extension not found").
      - target: LinkoTunnel
        embed: true
        codeSign: true
    postBuildScripts:
      - name: Embed vendored sing-box
        shell: /bin/sh
        script: |
          # Bundle the vendored core (if fetched) so the app finds it
          # regardless of the launch working directory.
          SRC="$SRCROOT/vendor/sing-box/sing-box"
          DST="$BUILT_PRODUCTS_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/sing-box"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            chmod +x "$DST"
            # The vendored core ships without hardened runtime, which fails
            # notarization ("executable does not have the hardened runtime
            # enabled"). Re-sign it with the build's identity + runtime + a
            # secure timestamp. Skipped for unsigned/ad-hoc builds.
            if [ -n "$EXPANDED_CODE_SIGN_IDENTITY" ] && [ "$EXPANDED_CODE_SIGN_IDENTITY" != "-" ]; then
              codesign --force --options runtime --timestamp \
                --sign "$EXPANDED_CODE_SIGN_IDENTITY" "$DST"
            fi
          fi
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/sing-box
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gumpw.linko
        PRODUCT_NAME: Linko
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # App icon: the Linko.icon Icon Composer document (declared as a target
        # resource above). actool compiles it and writes CFBundleIconName.
        ASSETCATALOG_COMPILER_APPICON_NAME: Linko
        GENERATE_INFOPLIST_FILE: YES
        # Supplementary plist merged on top of the generated one — declares the
        # `linko://` URL scheme (CFBundleURLTypes), which has no INFOPLIST_KEY_*.
        INFOPLIST_FILE: apps/LinkoApp/Info.plist
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        # Required for the app to request its packet-tunnel system extension.
        INFOPLIST_KEY_NSSystemExtensionUsageDescription: "Linko 使用系统扩展以 TUN 全局模式接管网络流量。"
        # --- Sparkle auto-update keys (see docs/RELEASE.md) ---
        # Canonical appcast: GitHub's `releases/latest/download/<asset>` permalink
        # always resolves to the newest NON-prerelease release's appcast.xml, so
        # the feed URL is fixed for the life of the app — the release pipeline just
        # re-attaches an updated appcast.xml to each stable release.
        INFOPLIST_KEY_SUFeedURL: https://github.com/wanggang316/linko/releases/latest/download/appcast.xml
        # EdDSA (ed25519) PUBLIC key (generated by `Sparkle/bin/generate_keys`).
        # The matching PRIVATE key lives only in the macOS Keychain / CI secret
        # SPARKLE_PRIVATE_KEY and is NEVER committed.
        INFOPLIST_KEY_SUPublicEDKey: 1VcZo4wK4/fMLaORR/MB2JBI/N41kAJoYl7qfrYHnp8=
        # Enable Sparkle's scheduled background checks (every 24h by default).
        INFOPLIST_KEY_SUEnableAutomaticChecks: YES
        INFOPLIST_KEY_SUScheduledCheckInterval: 86400
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: HC438T2B8P
        CODE_SIGN_ENTITLEMENTS: apps/LinkoApp/LinkoApp.entitlements
        # A SIP-on system extension must be Developer ID signed + notarized;
        # automatic signing only produces Mac Development profiles, whose
        # networkextension value is `packet-tunnel-provider` and can't satisfy
        # our `packet-tunnel-provider-systemextension` entitlement. So both
        # targets sign manually with Developer ID + a matching Developer ID
        # provisioning profile (create on developer.apple.com — see
        # docs/M2-DEVICE-TEST.md). Mirrors SagerNet/sing-box-for-apple.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: Developer ID Application
        PROVISIONING_PROFILE_SPECIFIER: Linko DeveloperID

  LinkoTunnel:
    type: system-extension
    platform: macOS
    sources:
      - path: apps/LinkoTunnel/Sources
    dependencies:
      # The extension is the sole consumer of libbox; the main app does not
      # link it. Libbox.framework is a STATIC archive (gomobile bind output),
      # so the Go runtime is linked directly into the LinkoTunnel binary — do
      # NOT embed it (no dylib to copy, and embedding a static archive trips up
      # signing/notarization).
      - framework: vendor/libbox/Libbox.xcframework
        embed: false
        link: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gumpw.linko.tunnel
        # The .systemextension bundle's on-disk name must be the bundle
        # identifier: every working reference names it that way (Tailscale's
        # io.tailscale.ipn.macsys.network-extension.systemextension, Surge's
        # com.nssurge.surge-mac.ne.systemextension, Apple's samples), and on
        # macOS 26 the SystemExtensions framework fails discovery with Code 4
        # "Extension not found in App bundle" when it is named by product
        # name instead. PRODUCT_NAME drives that on-disk name (and the
        # executable name, which the references also set to the identifier).
        PRODUCT_NAME: com.gumpw.linko.tunnel
        PRODUCT_MODULE_NAME: LinkoTunnel
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: apps/LinkoTunnel/Info.plist
        DEVELOPMENT_TEAM: HC438T2B8P
        CODE_SIGN_ENTITLEMENTS: apps/LinkoTunnel/LinkoTunnel.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES
        # Manual Developer ID signing (see the LinkoApp note above).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: Developer ID Application
        PROVISIONING_PROFILE_SPECIFIER: LinkoTunnel DeveloperID
        # Ensure the framework is found at link + runtime.
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/vendor/libbox
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        OTHER_LDFLAGS:
          - $(inherited)
          - -lresolv
