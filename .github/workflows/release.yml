name: release

# Stable Developer ID release. Triggered by pushing a vX.Y.Z tag (or manually
# against an existing tag). Builds libbox, archives + signs with Developer ID
# and the app/extension provisioning profiles, notarizes app + DMG, generates
# a Sparkle-signed appcast, and drafts a GitHub Release with the artifacts.
# The release is left as a DRAFT — publishing it (manually) is what triggers
# update-cask.yml and makes it the canonical Sparkle feed.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing vX.Y.Z tag to build'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$' || { echo "::error::tag '$TAG' is not vX.Y.Z"; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Select Xcode 26
        run: |
          DEV=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "${DEV:-/Applications/Xcode.app}/Contents/Developer"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Verify tag matches project version
        run: |
          MV=$(awk -F'"' '/^[[:space:]]*MARKETING_VERSION:/{print $2; exit}' project.yml)
          if [ "$MV" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::tag ${{ steps.meta.outputs.version }} != project.yml MARKETING_VERSION $MV"
            exit 1
          fi

      - name: Cache Libbox.xcframework
        id: libbox-cache
        uses: actions/cache@v4
        with:
          path: vendor/libbox
          key: libbox-${{ hashFiles('scripts/build-libbox.sh') }}

      - name: Build Libbox.xcframework
        if: steps.libbox-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-libbox.sh

      - name: Fetch sing-box core
        run: make fetch-core

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          P12_PATH="$RUNNER_TEMP/devid.p12"
          printf '%s' "$P12_BASE64" | base64 -D > "$P12_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          SHA=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep 'Developer ID Application' | head -1 | awk '{print $2}')
          [ -n "$SHA" ] || { echo "::error::Developer ID Application identity not found after import"; exit 1; }
          echo "DEVELOPER_ID_IDENTITY_SHA=$SHA" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm -f "$P12_PATH"

      - name: Install provisioning profiles
        env:
          APP_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_APP_BASE64 }}
          EXT_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_EXT_BASE64 }}
        run: |
          DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$DIR"
          printf '%s' "$APP_PROFILE_BASE64" | base64 -D > "$DIR/linko-app.provisionprofile"
          printf '%s' "$EXT_PROFILE_BASE64" | base64 -D > "$DIR/linko-ext.provisionprofile"
          echo "installed profiles:"
          for f in "$DIR"/linko-*.provisionprofile; do
            echo "  $(security cms -D -i "$f" 2>/dev/null | plutil -extract Name raw - 2>/dev/null)"
          done

      - name: Build, sign, notarize, package
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: make release

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          V="${{ steps.meta.outputs.version }}"
          NOTES="$RUNNER_TEMP/notes.md"
          sed -n "/^## \[$V\]/,/^## \[/p" CHANGELOG.md | sed '$d' > "$NOTES"
          if [ ! -s "$NOTES" ]; then
            printf 'Linko v%s\n' "$V" > "$NOTES"
          fi
          echo "path=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.meta.outputs.version }}"
          gh release create "v$V" \
            --draft \
            --title "v$V" \
            --notes-file "${{ steps.notes.outputs.path }}" \
            ".build/release/Linko-$V.dmg" \
            ".build/release/Linko-$V.dmg.sha256" \
            ".build/release/appcast.xml"

      - name: Cleanup keychain
        if: always()
        run: |
          [ -n "${KEYCHAIN_PATH:-}" ] && security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
